<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- froede mark: the product's own selection UI as the logo.
       Indigo selection frame + amber corner handles + a text caret. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- selection frame -->
  <rect x="136" y="164" width="240" height="184" rx="22" stroke="#818CF8" stroke-width="16"/>
  <!-- text caret -->
  <rect x="242" y="204" width="28" height="104" rx="14" fill="#E0E7FF"/>
  <!-- corner handles (same amber as the extension's resize handles) -->
  <rect x="112" y="140" width="48" height="48" rx="12" fill="#F59E0B" stroke="#1E1B4B" stroke-width="10"/>
  <rect x="352" y="140" width="48" height="48" rx="12" fill="#F59E0B" stroke="#1E1B4B" stroke-width="10"/>
  <rect x="112" y="324" width="48" height="48" rx="12" fill="#F59E0B" stroke="#1E1B4B" stroke-width="10"/>
  <rect x="352" y="324" width="48" height="48" rx="12" fill="#F59E0B" stroke="#1E1B4B" stroke-width="10"/>
</svg>
